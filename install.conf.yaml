- clean: ["~"]

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.zshenv: prezto/runcoms/zshenv
    ~/.zprofile: prezto/runcoms/zprofile
    ~/.zshrc: prezto/runcoms/zshrc
    ~/.zpreztorc: prezto/runcoms/zpreztorc
    ~/.zlogin: prezto/runcoms/zlogin
    ~/.zlogout: prezto/runcoms/zlogout
    ~/.zprezto: prezto/
    ~/.gitconfig: gitconfig
    ~/.tmux.conf: tmux.conf
    ~/.vimrc: vimrc
    ~/.config: config

- shell:
    - cp ./fonts/* ~/Library/Fonts/
    - command: zsh ./scripts/macos.sh
      stdin: true
      stdout: true
    - command: zsh ./scripts/apps.sh
      stdin: true
      stdout: true
    - command: zsh ./scripts/macport.sh
      stdin: true
      stdout: true
